worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /tmp/nginx-access.log;

    # Writable temp paths (filesystem is read-only except /tmp, /run, /app/data)
    client_body_temp_path /run/client_body;
    proxy_temp_path       /run/proxy;
    fastcgi_temp_path     /run/fastcgi;
    scgi_temp_path        /run/scgi;
    uwsgi_temp_path       /run/uwsgi;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone for admin API (10 req/s burst 20)
    limit_req_zone $binary_remote_addr zone=api_limit:1m rate=10r/s;

    server {
        listen 8080;
        server_name _;

        # Prevent nginx from exposing the internal port in redirects
        absolute_redirect off;
        port_in_redirect off;

        # --- Security headers (all responses) ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # App icons (favicon + brand logo)
        location = /icon.svg { root /app/code; add_header Cache-Control "public, max-age=86400"; }
        location = /icon.png { root /app/code; add_header Cache-Control "public, max-age=86400"; }

        # Redirect /admin to /admin/
        location = /admin {
            return 301 /admin/;
        }

        # Admin dashboard + API - proxied to Python backend
        # Cloudron proxyAuth protects this path - X-Cloudron-User is trusted here
        location /admin/ {
            proxy_pass http://127.0.0.1:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Cloudron-User $http_x_cloudron_user;
            # Dashboard contains injected token - never cache
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'" always;

            # Show boot page while admin API starts up
            proxy_intercept_errors on;
            error_page 502 503 504 = /boot.html;
        }

        # Admin API - NOT behind proxyAuth
        # SECURITY: Strip X-Cloudron-User to prevent header forgery.
        # Only Bearer token auth is accepted on this path.
        location /_api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://127.0.0.1:8082/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Cloudron-User "";
        }

        # MCP endpoint - streaming support
        location /mcp {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Cloudron-User "";
            proxy_buffering off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        # Dynamic bridge endpoints - generated per MCP server that declares a bridge_port
        # Each server gets /bridge/<name>/ → 127.0.0.1:<bridge_port>
        include /app/data/.mcpjungle-managed/nginx-bridges*.conf;

        # Health check
        location /health {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default - proxy to MCPJungle with streaming support
        # Falls back to boot page if gateway isn't ready yet
        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Cloudron-User "";
            proxy_buffering off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;

            # Show boot page while gateway starts up
            proxy_intercept_errors on;
            error_page 502 503 504 = /boot.html;
        }

        # Boot page served during startup (static file, no proxy needed)
        location = /boot.html {
            internal;
            root /app/code/admin/static;
            add_header Cache-Control "no-store" always;
        }
    }
}
